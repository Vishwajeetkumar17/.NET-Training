<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Page 3</h2>
    <p id="result"></p>

    <script>
        // get query string
        var queryString = window.location.search;

        // parse query string
        var urlParams = new URLSearchParams(queryString);

        // get name and city from query string
        var name = urlParams.get("studentName");
        var city = urlParams.get("studentLocation");

        // display result
        document.getElementById("result").innerHTML =
            "Name: " + name + "<br>City: " + city;
    </script>
</body>

</html>
